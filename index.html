<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #F5F1E8;
  font-family: 'Playfair Display', serif;
  text-align: center;
  color: #3a3a3a;
}

/* soft sheet music background */
.overlay {
  background: url('https://upload.wikimedia.org/wikipedia/commons/6/6a/Sheet_music.jpg');
  opacity: 0.08;
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.content {
  position: relative;
  padding: 60px 20px;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
  margin-bottom: 10px;
}

.divider {
  width: 120px;
  height: 1px;
  background: #C8A96A;
  margin: 25px auto;
}

.section {
  margin: 40px 0;
}

.small {
  letter-spacing: 2px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

  <div class="section">
    <div class="names">Emma & Daniel</div>
    <div class="small">invite you to celebrate their wedding</div>
    <div class="divider"></div>
    <p>June 12, 2026</p>
  </div>

  <div class="section">
    <p><strong>Ceremony</strong> – 4:00 PM</p>
    <p>St. Mary's Church</p>
  </div>

  <div class="section">
    <p><strong>Reception</strong> – 6:00 PM</p>
    <p>Grand Ballroom</p>
  </div>

</div>

</body>
</html>
